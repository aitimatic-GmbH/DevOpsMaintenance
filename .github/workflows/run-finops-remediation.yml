# .github/workflows/run-finops-remediation.yml
name: 'Run FinOps Remediation'

on:
  workflow_dispatch:
    inputs:
      analysis_run_id:
        description: 'ID of the analysis run to use for remediation'
        required: true
      resource_type_to_remediate:
        description: 'Type of resource to remediate (or DRY-RUN)'
        required: true
        type: choice
        options:
          - DRY-RUN
          - unattached-disks
          - unassociated-public-ips
          - old-snapshots
          - underutilized-vms
          - all
      confirmation_phrase:
        description: 'Type "DELETE" to confirm the remediation action. (Not required for DRY-RUN)'
        required: false

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  remediate:
    name: 'Run FinOps Remediation'
    runs-on: ubuntu-latest

    steps:
      - name: 'Security Gate: Verify confirmation phrase'
        if: github.event.inputs.resource_type_to_remediate != 'DRY-RUN' && github.event.inputs.confirmation_phrase != 'DELETE'
        run: |
          echo "::error::Confirmation phrase 'DELETE' is required for actual remediation."
          exit 1

      - name: 'Checkout repository with submodules'
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.PAT_SUBMODULE_CHECKOUT }}

      - name: 'Download analysis results from the specified run'
        uses: actions/download-artifact@v4
        with:
          name: finops-analysis-results
          run-id: ${{ github.event.inputs.analysis_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Azure Login (Privileged - Write Access)'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_WRITE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_WRITE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Execute Remediation Script'
        run: |
          chmod +x services/azure-finops-manager/.github/scripts/remediate-resources.sh
          services/azure-finops-manager/.github/scripts/remediate-resources.sh --type "${{ github.event.inputs.resource_type_to_remediate }}"

      - name: 'Upload Remediation Log'
        uses: actions/upload-artifact@v6
        with:
          name: finops-remediation-log
          path: remediation-log.txt
          if-no-files-found: error

      - name: 'Azure Logout'
        if: always()
        run: |
          az logout
          az cache purge
          az account clear
